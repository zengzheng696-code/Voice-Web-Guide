<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Web Guide</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="vwg-popup-body">
    <main class="vwg-popup">
      <h1>Voice Web Guide</h1>
      <p>配置 DeepSeek 后，在普通网页右下角点击“开始语音指导”。</p>

      <label>
        <span>DeepSeek API Key</span>
        <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
      </label>

      <label>
        <span>API Endpoint</span>
        <input id="endpoint" type="url" placeholder="https://api.deepseek.com/chat/completions">
      </label>

      <label>
        <span>模型</span>
        <input id="model" type="text" placeholder="deepseek-chat">
      </label>

      <button id="save" type="button">保存配置</button>
      <p id="status" class="vwg-popup-status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
